<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار أسماء الإشارة - إسراء علي صادق</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F8F9FA;
            --success: #51CF66;
            --error: #FF6B6B;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-image {
            max-width: 200px;
            height: auto;
            margin: 0 auto 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.15));
            border-radius: 15px;
        }

        .teacher-info {
            margin-bottom: 15px;
        }

        .teacher-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #8B6F47 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .teacher-subtitle {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }

        /* Header */
        header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .title h1 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-icon {
            font-size: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stats {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .level-badge {
            background: linear-gradient(135deg, var(--accent), #FFD93D);
            color: var(--dark);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            header {
                flex-direction: column;
            }
            
            .stats {
                justify-content: center;
            }

            .logo-image {
                max-width: 150px;
            }

            .teacher-name {
                font-size: 20px;
            }
        }

        /* Question Card */
        .question-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .question-text {
            font-size: 22px;
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .points-tag {
            display: inline-block;
            background: var(--accent);
            color: var(--dark);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: var(--light);
            border: 2px solid transparent;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            font-weight: 500;
        }

        .option:hover {
            background: #f0f0f0;
            border-color: var(--secondary);
            transform: translateX(-10px);
        }

        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .option.correct {
            background: rgba(81, 207, 102, 0.1);
            border-color: var(--success);
        }

        .option.incorrect {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--error);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #FF5252);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
            border: 2px solid var(--secondary);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: white;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .progress-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .result-message {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-message.success {
            background: rgba(81, 207, 102, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .result-message.error {
            background: rgba(255, 107, 107, 0.1);
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .modal h2 {
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .modal-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .student-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .student-item {
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border-right: 4px solid var(--primary);
        }

        .student-name {
            font-weight: 600;
            color: var(--dark);
        }

        .student-meta {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAIBAQIBAQICAgICAgICAwUDAwwUAxUTAwwSAxIMEQwRB..." alt="شعار إسراء علي صادق" class="logo-image">
            <div class="teacher-info">
                <div class="teacher-name">إسراء علي صادق</div>
                <div class="teacher-subtitle">معلمة اللغة العربية</div>
            </div>
        </div>

        <!-- Header -->
        <header>
            <div class="title">
                <span class="title-icon">📝</span>
                <h1>اختبار أسماء الإشارة</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">النقاط</span>
                    <span class="stat-value" id="totalPoints">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">الصحيح</span>
                    <span class="stat-value" id="correctCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">المستوى</span>
                    <span class="level-badge" id="levelBadge">المبتدئ</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Question Section -->
            <div class="question-card" id="questionCard">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <div class="question-number" id="questionNum">1</div>
                        <span class="points-tag" id="pointsTag">10 نقاط</span>
                    </div>
                    <div style="font-size: 14px; color: #999;">
                        السؤال <span id="currentQuestion">1</span> من <span id="totalQuestions">20</span>
                    </div>
                </div>

                <p class="question-text" id="questionText"></p>

                <div class="options" id="optionsContainer"></div>

                <div id="resultMessage"></div>

                <div class="button-group">
                    <button class="btn-primary" id="submitBtn" onclick="submitAnswer()">أرسل الإجابة</button>
                    <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">السؤال التالي</button>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Progress Card -->
                <div class="progress-card">
                    <div class="card-title">📊 التقدم</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div class="modal" id="resultsModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">✅</div>
            <h2 id="modalTitle">مبروك!</h2>
            <p class="modal-message" id="modalMessage"></p>
            <button class="btn-primary" onclick="resetGame()">لعب مرة أخرى</button>
        </div>
    </div>

    <!-- Student Selector Modal -->
    <div class="modal" id="studentModal">
        <div class="modal-content" style="max-width: 600px; text-align: right;">
            <h2>👋 اختري اسمك</h2>
            <div class="student-list" id="studentList"></div>
            <input type="text" id="studentName" placeholder="أو اكتبي اسمك الجديد" style="width: 100%; padding: 12px; margin-top: 20px; border: 2px solid #eee; border-radius: 8px; font-family: 'Tajawal', sans-serif; direction: rtl;" dir="rtl">
            <button class="btn-primary" onclick="addNewStudent()" style="width: 100%; margin-top: 15px;">إضافة طالبة جديدة</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "ما اسم الإشارة للقريب المفرد المذكر؟",
                options: ["ذاك", "هذا", "أولئك", "تلك"],
                correct: 1,
                points: 10
            },
            {
                question: "أكمل: 'هذا _______ جميل'",
                options: ["كتاب", "الكتاب", "الكتاب جميل", "كتاب جميل"],
                correct: 1,
                points: 10
            },
            {
                question: "ما اسم الإشارة للبعيد المفرد المؤنث؟",
                options: ["هذه", "تلك", "هاتان", "أولئك"],
                correct: 1,
                points: 10
            },
            {
                question: "اختري الجملة الصحيحة:",
                options: ["هذا كتاب", "هذا الكتاب", "ذاك الكتب", "هؤلاء الكتاب"],
                correct: 1,
                points: 15
            },
            {
                question: "اسم الإشارة للقريب المثنى المذكر:",
                options: ["هذا", "هذان", "هؤلاء", "تلك"],
                correct: 1,
                points: 10
            },
            {
                question: "في الجملة 'الكتاب هذا جميل' موقع اسم الإشارة:",
                options: ["مبتدأ", "خبر", "مفعول به", "جار ومجرور"],
                correct: 1,
                points: 15
            },
            {
                question: "أي جملة فيها خطأ؟",
                options: ["هؤلاء الطالبات مجتهدات", "تلك النجمة جميلة", "هذا فتى", "ذاك الجبل عالٍ"],
                correct: 2,
                points: 15
            },
            {
                question: "الفرق بين 'هذا' و'ذاك':",
                options: ["لا فرق", "هذا للقريب وذاك للبعيد", "هذا للبعيد وذاك للقريب", "لا أعرف"],
                correct: 1,
                points: 10
            },
            {
                question: "اختري الجملة الصحيحة:",
                options: ["أولئك الطالب ذكي", "أولئك الطالبات ذكيات", "هؤلاء الطالب", "تلك الطالبات"],
                correct: 1,
                points: 15
            },
            {
                question: "اسم الإشارة للبعيد المثنى المذكر:",
                options: ["هذان", "ذانك", "ذاك", "أولئك"],
                correct: 1,
                points: 10
            },
            {
                question: "اسم الإشارة يجب أن يطابق المشار إليه في:",
                options: ["الزمن", "التذكير والتأنيث والعدد", "الموقع", "لا أعرف"],
                correct: 1,
                points: 10
            },
            {
                question: "في الجملة 'أحب هذه الحديقة' اسم الإشارة هو:",
                options: ["أحب", "هذه", "الحديقة", "هذه الحديقة"],
                correct: 1,
                points: 10
            },
            {
                question: "أي استخدام خاطئ؟",
                options: ["هذا الكتاب", "هذا الكتاب الجميل", "تلك الوردة", "هذا البعير"],
                correct: 0,
                points: 15
            },
            {
                question: "اسم الإشارة 'أولئك' يُستخدم للإشارة إلى:",
                options: ["المفرد المذكر", "المفرد المؤنث", "الجمع", "المثنى"],
                correct: 2,
                points: 10
            },
            {
                question: "في الجملة 'هؤلاء الطالبات يدرسن' إعراب 'الطالبات':",
                options: ["مبتدأ", "بدل", "خبر", "مفعول به"],
                correct: 1,
                points: 15
            },
            {
                question: "أي جملة فيها تطابق صحيح؟",
                options: ["هؤلاء المعلمة", "هذا الطالبة", "تلك الشجرة", "ذاك الفتيات"],
                correct: 2,
                points: 15
            },
            {
                question: "الفرق الأساسي بين 'هذا' و'ذاك':",
                options: ["الموقع في الجملة", "المسافة من المتحدث", "نوع الشيء", "لا فرق"],
                correct: 1,
                points: 10
            },
            {
                question: "اسم الإشارة للقريب المثنى المؤنث:",
                options: ["هذا", "هاتان", "هؤلاء", "تلك"],
                correct: 1,
                points: 10
            },
            {
                question: "متى نستخدم لام الكسرة؟",
                options: ["دائماً", "مع الحروف مثل ذي وهذي", "مع الأسماء فقط", "لا توجد"],
                correct: 1,
                points: 10
            },
            {
                question: "في الجملة 'رأيت هذا الشيء' موقع اسم الإشارة:",
                options: ["مبتدأ", "خبر", "مفعول به", "جار ومجرور"],
                correct: 2,
                points: 15
            }
        ];

        let currentQuestion = 0;
        let totalPoints = 0;
        let correctAnswers = 0;
        let currentStudent = null;
        let students = [];
        let studentResults = {};
        let answeredQuestions = new Set();

        window.addEventListener('load', () => {
            loadStudents();
            showStudentModal();
        });

        function showStudentModal() {
            document.getElementById('studentModal').classList.add('active');
            renderStudentList();
        }

        function loadStudents() {
            const saved = localStorage.getItem('demonstrative_students');
            if (saved) {
                students = JSON.parse(saved);
                const saved_results = localStorage.getItem('demonstrative_results');
                if (saved_results) studentResults = JSON.parse(saved_results);
            }
        }

        function saveStudents() {
            localStorage.setItem('demonstrative_students', JSON.stringify(students));
            localStorage.setItem('demonstrative_results', JSON.stringify(studentResults));
        }

        function renderStudentList() {
            const list = document.getElementById('studentList');
            list.innerHTML = '';
            students.forEach((student) => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <div class="student-name">${student.name}</div>
                    <div class="student-meta">النقاط: ${studentResults[student.id]?.points || 0}</div>
                `;
                div.onclick = () => selectStudent(student.id);
                list.appendChild(div);
            });
        }

        function selectStudent(studentId) {
            currentStudent = studentId;
            document.getElementById('studentModal').classList.remove('active');
            resetGame();
        }

        function addNewStudent() {
            const name = document.getElementById('studentName').value.trim();
            if (name) {
                const student = {
                    id: Date.now(),
                    name: name,
                    createdAt: new Date().toISOString()
                };
                students.push(student);
                studentResults[student.id] = { points: 0, correct: 0 };
                saveStudents();
                selectStudent(student.id);
            }
        }

        function loadQuestion(index) {
            const q = questions[index];
            document.getElementById('questionNum').textContent = index + 1;
            document.getElementById('currentQuestion').textContent = index + 1;
            document.getElementById('totalQuestions').textContent = questions.length;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('pointsTag').textContent = q.points + ' نقاط';

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((option, i) => {
                const label = document.createElement('label');
                label.className = 'option';
                label.innerHTML = `
                    <input type="radio" name="answer" value="${i}">
                    ${option}
                `;
                container.appendChild(label);
            });

            document.getElementById('resultMessage').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            updateProgress();
        }

        function submitAnswer() {
            if (answeredQuestions.has(currentQuestion)) {
                nextQuestion();
                return;
            }

            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) {
                alert('اختري إجابة أولاً');
                return;
            }

            answeredQuestions.add(currentQuestion);
            const answer = parseInt(selected.value);
            const correct = questions[currentQuestion].correct === answer;

            if (correct) {
                totalPoints += questions[currentQuestion].points;
                correctAnswers++;
                document.querySelector('.option:nth-child(' + (answer + 1) + ')').classList.add('correct');
                showResult(true, questions[currentQuestion].points);
            } else {
                document.querySelector('.option:nth-child(' + (answer + 1) + ')').classList.add('incorrect');
                document.querySelector('.option:nth-child(' + (questions[currentQuestion].correct + 1) + ')').classList.add('correct');
                showResult(false);
            }

            updateStats();
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function showResult(isCorrect, points = 0) {
            const msg = document.getElementById('resultMessage');
            if (isCorrect) {
                msg.className = 'result-message success';
                msg.innerHTML = `<span>✅</span> صحيح! +${points} نقطة`;
            } else {
                msg.className = 'result-message error';
                msg.innerHTML = `<span>❌</span> الإجابة خاطئة`;
            }
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion(currentQuestion);
            } else {
                endGame();
            }
        }

        function updateStats() {
            document.getElementById('totalPoints').textContent = totalPoints;
            document.getElementById('correctCount').textContent = correctAnswers;
            updateLevel();
            updateProgress();
        }

        function updateLevel() {
            const levels = [
                { name: 'المبتدئ', min: 0, emoji: '🌱' },
                { name: 'المتوسط', min: 80, emoji: '📚' },
                { name: 'المتقدم', min: 150, emoji: '🎯' },
                { name: 'الخبير', min: 240, emoji: '⭐' }
            ];

            let level = levels[0];
            for (let l of levels) {
                if (totalPoints >= l.min) level = l;
            }

            document.getElementById('levelBadge').textContent = level.emoji + ' ' + level.name;
        }

        function updateProgress() {
            const progress = (answeredQuestions.size / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = Math.round(progress) + '%';
        }

        function endGame() {
            studentResults[currentStudent] = {
                points: totalPoints,
                correct: correctAnswers
            };
            saveStudents();

            const percentage = (correctAnswers / questions.length) * 100;
            const modal = document.getElementById('resultsModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMessage');

            if (percentage === 100) {
                icon.textContent = '🎯';
                title.textContent = 'مثالي!';
                message.textContent = `لقد أجبتِ على جميع الأسئلة بشكل صحيح! 🌟\nحصلتِ على ${totalPoints} نقطة`;
            } else if (percentage >= 80) {
                icon.textContent = '⭐';
                title.textContent = 'أداء ممتاز!';
                message.textContent = `حصلتِ على ${correctAnswers} من ${questions.length} أسئلة صحيحة\n${totalPoints} نقطة`;
            } else if (percentage >= 60) {
                icon.textContent = '👍';
                title.textContent = 'جيد!';
                message.textContent = `حصلتِ على ${correctAnswers} من ${questions.length} أسئلة صحيحة\n${totalPoints} نقطة`;
            } else {
                icon.textContent = '💪';
                title.textContent = 'استمري في الممارسة!';
                message.textContent = `حصلتِ على ${correctAnswers} من ${questions.length} أسئلة صحيحة\n${totalPoints} نقطة`;
            }

            modal.classList.add('active');
        }

        function resetGame() {
            currentQuestion = 0;
            totalPoints = 0;
            correctAnswers = 0;
            answeredQuestions.clear();
            document.getElementById('resultsModal').classList.remove('active');
            updateStats();
            loadQuestion(0);
        }
    </script>
</body>
</html>
